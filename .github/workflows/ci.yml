name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (debug)
        run: swift build

      # swift test is currently disabled because XCTest is unavailable
      # in the macOS runner toolchain. Re-enable once tests are fixed.

      - name: Package universal release archive
        run: ./package_release.sh

      - name: Verify bundle architecture
        run: lipo -info PingBar.app/Contents/MacOS/PingBar
